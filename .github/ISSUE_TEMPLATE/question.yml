name: Frage stellen
description: Stelle eine allgemeine Frage zur App
title: "[Frage]: "
labels:
  - question
body:
  - type: markdown
    attributes:
      value: |
        Hier kannst du Fragen zur Nutzung der App stellen. Bitte keine privaten Zugangsdaten oder sensiblen Haushaltsdaten posten.

  - type: textarea
    id: question
    attributes:
      label: Deine Frage
      description: Was möchtest du wissen?
      placeholder: "Beispiel: Wie kann ich ein Haushaltsmitglied einladen?"
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Bereich
      options:
        - Speiseplan
        - Einkaufsliste
        - Rezepte / Gerichte
        - Haushalt / Mitglieder
        - Login / Konto
        - Android App
        - Webversion
        - Sonstiges
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Zusatzinfos
      description: Falls nötig, beschreibe kurz den Kontext.
      placeholder: Optional.
    validations:
      required: false
